<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Graduation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
width:100%;
overflow:hidden;
font-family:'Great Vibes',cursive;
background:url("assets/background.jpg") center/cover no-repeat;
position:relative;
}

/* DARK OVERLAY */

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
z-index:1;
}

/* TITLE */

.title{
position:absolute;
top:15%;
width:100%;
text-align:center;
font-size:3rem;
color:white;
z-index:2;
animation: glow 2s infinite alternate;

text-shadow:
0 0 10px rgba(255,255,255,0.9),
0 0 25px rgba(255,255,255,0.6);
}

@keyframes glow{
from{
text-shadow:
0 0 10px white,
0 0 20px white;
}
to{
text-shadow:
0 0 20px white,
0 0 40px white;
}
}

/* ENVELOPE */

.envelope-container{
position:absolute;
bottom:-300px;
width:100%;
display:flex;
justify-content:center;
z-index:3;
opacity:0;
}

.envelope-container img{
width:90vw;
max-width:500px;
transition:opacity .4s, transform .4s;
cursor:pointer;
}

.envelope-container img:hover{
transform:scale(1.05) rotate(-1deg);
}

.envelope-container img:active{
transform:scale(.95);
}

.fade-out{
opacity:0;
transform:scale(.9);
}

.fade-in{
opacity:1;
transform:scale(1);
}

@keyframes slideUp{
to{ bottom:20%; }
}

/* MESSAGE AREA */

.final-text{
position:absolute;
bottom:10%;
width:100%;
text-align:center;
opacity:0;
z-index:2;
transition:opacity 1s;

color:white;
text-shadow:0 0 10px rgba(255,255,255,0.8);
font-family:'Poppins',sans-serif;
}

.letter{
position:absolute;
bottom:30%;
left:50%;
transform:translateX(-50%) translateY(200px) scale(.8);
background:white;
color:#333;
padding:20px;
border-radius:12px;
font-family:'Poppins',sans-serif;
opacity:0;
transition:1s;
width:75%;
max-width:320px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.letter.show{
opacity:1;
transform:translateX(-50%) translateY(-60px) scale(1);
}

input,textarea{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
width:70%;
max-width:260px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:#444;
font-weight:bold;
cursor:pointer;
}

/* FIREWORK */

canvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:1;
pointer-events:none;
}

/* POPUP */

.popup{
position:fixed;
top:65%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:20px 30px;
border-radius:15px;
color:white;
font-family:'Poppins',sans-serif;
opacity:0;
transition:.5s;
z-index:10;
}

.popup-note{
font-size:12px;
margin-top:8px;
opacity:0.7;
font-family:'Poppins',sans-serif;
}

.popup.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body>

<div class="overlay"></div>

<div id="popup" class="popup">
<div id="popupText"></div>
<div class="popup-note">tap to continue</div>
</div>

<h1 class="title">Happy Graduation</h1>

<div class="envelope-container">
<img id="envelope" src="assets/amplop-closed.png">
</div>

<div class="letter" id="letter">
<p>Congratulations on your graduation 🎓</p>
</div>

<div class="final-text">

<p style="margin-bottom:10px;">
Tinggalkan pesan untuk seseorang yang mengirimmu ini 💌
</p>

<textarea id="message" placeholder="Write your message..."></textarea>

<br>

<button onclick="sendMessage()">Send</button>

</div>

<audio id="gradSound" src="assets/sound.mp3" loop></audio>

<canvas id="fireworks"></canvas>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("TCM2fJBBwcjLh27Dh")

const envelope = document.getElementById("envelope")
const sound = document.getElementById("gradSound")
const finalText = document.querySelector(".final-text")
const popup = document.getElementById("popup")
const popupText = document.getElementById("popupText")
const envelopeContainer = document.querySelector(".envelope-container")

let popupStage = 0
let stage = 0

const popupMessages = [
"HAIII JENNYYY >_< ✨",
"CONGRATS FOR YOUR GRADUATIONS YAAAAA 💌",
"I Have Somethings For Youu, Dibacaa yaaaaaaa 💗"
]

const images = [
"assets/amplop-closed.png",
"assets/amplop-open-1.png",
"assets/amplop-open-2.png",
"assets/amplop-open-3.png"
]

/* saat web dibuka */

window.onload = () => {

popupText.innerText = popupMessages[0]
popup.classList.add("show")

}

/* klik popup */

popup.addEventListener("click", () => {

if(popupStage === 0){
sound.currentTime = 0
sound.play().catch(()=>{})
}

popupStage++

if(popupStage < popupMessages.length){

popupText.innerText = popupMessages[popupStage]

}else{

popup.classList.remove("show")

envelopeContainer.style.opacity = 1
envelopeContainer.style.animation = "slideUp 1.5s forwards"

}

})

/* klik amplop */

envelope.addEventListener("click", () => {

if(stage < 3){

showPopup("Keep opening the envelope 💌")

envelope.classList.add("fade-out")

setTimeout(() => {

stage++
envelope.src = images[stage]

envelope.classList.remove("fade-out")
envelope.classList.add("fade-in")

setTimeout(()=>{
envelope.classList.remove("fade-in")
},400)

},400)

}

if(stage === 3){

launchFireworks()
finalText.style.opacity = 1
document.getElementById("letter").classList.add("show")

}

})

/* fireworks */

function launchFireworks(){

const container = document.getElementById("fireworks")

const fireworks = new Fireworks.default(container,{
autoresize:true,
opacity:0.6,
acceleration:1.08,
friction:0.94,
gravity:1.3,
particles:160,
trace:6,
explosion:8,
intensity:40
})

fireworks.start()

}

/* kirim email */

function sendMessage(){

let message = document.getElementById("message").value

emailjs.send("Graduation","template_0gqu7rt",{
message:message
}).then(()=>{

    setTimeout(()=>{
popup.classList.remove("show")
},3000)

// tampilkan popup
popupText.innerText = "terimakasihhhh, senengg bangett bisa kenall sama kamuuu 🫶"
popup.classList.add("show")

// hapus isi input
document.getElementById("message").value = ""

})

}

function showPopup(text){

popupText.innerText = text
popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},1500)

}
</script>

</body>
</html>
